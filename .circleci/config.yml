version: 2.1

orbs:
  codecov: codecov/codecov@4

jobs:
  test:
    docker:
      - image: cimg/ruby:3.3.4
    steps:
      - checkout
      - restore_cache:
          keys:
            - bundle-{{ checksum "Gemfile.lock" }}
      - run: bundle install
      - save_cache:
          key: bundle-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle
      - run: bundle exec rspec
      - run: bundle exec rubocop
      - codecov/upload

workflows:
  test:
    jobs:
      - test
